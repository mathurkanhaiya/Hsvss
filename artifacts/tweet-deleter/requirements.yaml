packages:
  "framer-motion": "For smooth page transitions and micro-interactions"
  "date-fns": "For formatting dates easily"
  "lucide-react": "For beautiful icons"
  "clsx": "For conditional tailwind classes"
  "tailwind-merge": "For merging tailwind classes safely"
  "@hookform/resolvers": "Zod resolver for forms"
  "react-hook-form": "For robust form state management"
  "zod": "For local form validation schemas"

images:
